services:
  mysql:
    image: mysql:8.0
    container_name: artel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: artel
      MYSQL_USER: artel
      MYSQL_PASSWORD: artel_dev
    ports:
      - "3307:3306"
    volumes:
      - artel_mysql_data:/var/lib/mysql

volumes:
  artel_mysql_data:
